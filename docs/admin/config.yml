backend:
  name: git-gateway
  branch: main

media_folder: docs/uploads
public_folder: /uploads

collections:
  - name: site_content
    label: Site Content
    files:
      - label: Event Slides
        name: events
        file: docs/data/events.json
        format: json
        fields:
          - label: Events
            name: events
            widget: list
            summary: "{{fields.title}}"
            fields:
              - label: Enabled
                name: enabled
                widget: boolean
                default: false
              - label: Title
                name: title
                widget: string
              - label: Date
                name: date
                widget: datetime
                date_format: YYYY-MM-DD
                time_format: false
                format: YYYY-MM-DD
              - label: Location
                name: location
                widget: string
                required: false
              - label: Description
                name: description
                widget: text
              - label: Slide Duration (seconds)
                name: duration
                widget: number
                default: 20
                min: 8
                max: 60
                value_type: int
              - label: Images
                name: images
                widget: list
                allow_add: true
                collapsed: false
                field:
                  label: Image
                  name: image
                  widget: image
